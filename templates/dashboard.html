{% extends "base.html" %}

{% block title %}Fit • дашборд{% endblock %}

{% block content %}
<style>
    .greeting {
        margin-bottom: 36px;
        animation: slideUp 0.5s ease;
    }

    .greeting h1 {
        font-size: 40px;
        font-weight: 700;
        color: #ffffff;
        margin-bottom: 8px;
        letter-spacing: -1px;
    }

    .greeting h1 strong {
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff, #c0b0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .greeting p {
        color: #aaaaaa;
        font-size: 17px;
        font-weight: 500;
    }

    .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 36px;
    }

    .stat-card {
        background: linear-gradient(135deg, #1a0a30, #0a0218);
        backdrop-filter: blur(15px);
        border-radius: 26px;
        padding: 28px 24px;
        border: 1px solid rgba(140,100,255,0.15);
        transition: all 0.3s ease;
        animation: fadeUp 0.5s ease backwards;
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .stat-card:nth-child(1) { animation-delay: 0.1s; }
    .stat-card:nth-child(2) { animation-delay: 0.2s; }
    .stat-card:nth-child(3) { animation-delay: 0.3s; }
    .stat-card:nth-child(4) { animation-delay: 0.4s; }

    .stat-card:hover {
        transform: translateY(-5px);
        border-color: rgba(180,140,255,0.4);
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), 0 0 30px rgba(100,60,200,0.2);
    }

    .stat-label {
        color: #bbbbbb;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 16px;
        font-weight: 600;
    }

    .stat-value {
        font-size: 56px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1;
        letter-spacing: -1.5px;
    }

    .stat-unit {
        color: #888888;
        font-size: 16px;
        margin-left: 6px;
        font-weight: 500;
    }

    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        margin-bottom: 20px;
    }

    .section-header h2 {
        color: #ffffff;
        font-size: 24px;
        font-weight: 700;
        letter-spacing: -0.5px;
    }

    .section-header a {
        color: #a090cc;
        text-decoration: none;
        font-weight: 600;
        font-size: 15px;
        transition: color 0.2s;
    }

    .section-header a:hover { color: #ffffff; }

    .feed {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-bottom: 40px;
    }

    .feed-item {
        background: linear-gradient(135deg, #150a28, #080218);
        backdrop-filter: blur(15px);
        border-radius: 22px;
        padding: 24px 26px;
        display: flex;
        align-items: center;
        gap: 22px;
        cursor: pointer;
        transition: all 0.3s ease;
        border: 1px solid rgba(140,100,255,0.1);
        animation: fadeUp 0.5s ease backwards;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .feed-item:hover {
        background: linear-gradient(135deg, #1e0e35, #0c0520);
        transform: translateX(8px);
        border-color: rgba(180,140,255,0.3);
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .feed-icon {
        width: 56px;
        height: 56px;
        background: linear-gradient(135deg, #3a1a5a, #1a0a3a);
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        border: 1px solid rgba(180,140,255,0.2);
    }

    .feed-info { flex: 1; }

    .feed-title {
        color: #ffffff;
        font-weight: 700;
        margin-bottom: 8px;
        font-size: 17px;
    }

    .feed-meta {
        display: flex;
        gap: 24px;
        color: #aaaaaa;
        font-size: 14px;
        font-weight: 500;
    }

    .feed-stats {
        text-align: right;
    }

    .feed-distance {
        color: #ffffff;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: -0.5px;
    }

    .feed-pace {
        color: #a090cc;
        font-size: 14px;
        margin-top: 5px;
        font-weight: 500;
    }

    .quick-actions {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 16px;
    }

    .action-btn {
        background: linear-gradient(135deg, #150a28, #080218);
        backdrop-filter: blur(15px);
        border-radius: 60px;
        padding: 24px;
        text-align: center;
        text-decoration: none;
        transition: all 0.3s ease;
        border: 1px solid rgba(140,100,255,0.15);
        color: #ffffff;
        font-weight: 600;
        font-size: 17px;
        animation: fadeUp 0.5s ease backwards;
        box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .action-btn:nth-child(1) { animation-delay: 0.5s; }
    .action-btn:nth-child(2) { animation-delay: 0.6s; }

    .action-btn:hover {
        background: linear-gradient(135deg, #251545, #150a35);
        transform: translateY(-4px);
        box-shadow: 0 15px 35px rgba(0,0,0,0.4), 0 0 25px rgba(100,60,200,0.2);
        border-color: rgba(180,140,255,0.4);
    }

    .action-btn .emoji {
        display: block;
        font-size: 32px;
        margin-bottom: 10px;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
        .stats-grid { grid-template-columns: repeat(2, 1fr); }
        .stat-value { font-size: 44px; }
        .greeting h1 { font-size: 32px; }
    }
</style>

<div class="greeting">
    <h1>привет, <strong><span id="userName">{{ current_user.name or current_user.username }}</span></strong></h1>
    <p id="greeting">готов к тренировке?</p>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div class="stat-label">дистанция</div>
        <div class="stat-value"><span id="weekDistance">0</span><span class="stat-unit">км</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-label">время</div>
        <div class="stat-value"><span id="weekTime">0</span><span class="stat-unit">ч</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-label">тренировки</div>
        <div class="stat-value"><span id="weekActivities">0</span></div>
    </div>
    <div class="stat-card">
        <div class="stat-label">калории</div>
        <div class="stat-value"><span id="weekCalories">0</span></div>
    </div>
</div>

<div class="section-header">
    <h2>последние тренировки</h2>
    <a href="/activities">все →</a>
</div>

<div class="feed" id="feed">
    <div class="feed-item" style="justify-content: center;">
        <span style="color: #aaaaaa; font-weight: 500;">загрузка...</span>
    </div>
</div>

<div class="section-header" style="margin-top: 20px;">
    <h2>быстрый старт</h2>
</div>

<div class="quick-actions">
    <a href="/tracker?type=running" class="action-btn"><span class="emoji">🏃</span>бег</a>
    <a href="/tracker?type=cycling" class="action-btn"><span class="emoji">🚴</span>вело</a>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const user = await API.get('/api/user');
        document.getElementById('userName').textContent = user.name || user.username;

        const stats = await API.get('/api/user/stats/weekly');
        document.getElementById('weekDistance').textContent = ((stats.total_distance || 0) / 1000).toFixed(1);
        document.getElementById('weekTime').textContent = Math.floor((stats.total_time || 0) / 3600);
        document.getElementById('weekActivities').textContent = stats.total_activities || 0;
        document.getElementById('weekCalories').textContent = stats.total_calories || 0;

        const activities = await API.get('/api/activities');
        const feed = document.getElementById('feed');

        if (!activities.length) {
            feed.innerHTML = '<div class="feed-item" style="justify-content:center;"><span style="color:#aaaaaa; font-weight:500;">нет тренировок</span></div>';
        } else {
            feed.innerHTML = activities.slice(0, 5).map((a, i) => {
                const icons = { running: '🏃', cycling: '🚴', swimming: '🏊', strength: '🏋️' };
                const dist = a.sport_type === 'strength' ? `${a.sets || 0} подх.` :
                            a.sport_type === 'swimming' ? `${(a.distance || 0).toFixed(0)}м` :
                            `${((a.distance || 0) / 1000).toFixed(2)}км`;
                const pace = a.avg_pace && a.sport_type !== 'strength' ?
                    `${Math.floor((a.avg_pace || 0)/60)}:${Math.floor((a.avg_pace || 0)%60).toString().padStart(2,'0')}/км` : '';
                return `
                    <div class="feed-item" style="animation-delay: ${0.1 * i}s" onclick="location.href='/activity/${a.id}'">
                        <div class="feed-icon">${icons[a.sport_type] || '🏃'}</div>
                        <div class="feed-info">
                            <div class="feed-title">${a.sport_type || 'тренировка'}</div>
                            <div class="feed-meta">
                                <span>${new Date(a.start_time).toLocaleDateString('ru-RU', {day:'numeric', month:'short'})}</span>
                                <span>${Math.floor((a.duration || 0) / 60)} мин</span>
                            </div>
                        </div>
                        <div class="feed-stats">
                            <div class="feed-distance">${dist}</div>
                            ${pace ? `<div class="feed-pace">${pace}</div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (e) {}
});
</script>
{% endblock %}
