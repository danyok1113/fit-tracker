{% extends "base.html" %}

{% block title %}Fit • рекорды{% endblock %}

{% block content %}
<style>
    .records-container {
        max-width: 800px;
        margin: 0 auto;
    }

    .page-header {
        margin-bottom: 36px;
    }

    .page-header h1 {
        font-size: 36px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -1px;
    }

    .page-header p {
        color: #aaaaaa;
        font-size: 16px;
        margin-top: 8px;
    }

    .records-grid {
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .record-card {
        background: linear-gradient(135deg, #1a0a30, #0a0218);
        backdrop-filter: blur(15px);
        border-radius: 24px;
        padding: 28px;
        border: 1px solid rgba(140,100,255,0.15);
        display: flex;
        align-items: center;
        gap: 24px;
        transition: all 0.3s ease;
    }

    .record-card:hover {
        border-color: rgba(180,140,255,0.4);
        transform: translateX(6px);
    }

    .record-icon {
        width: 70px;
        height: 70px;
        background: linear-gradient(135deg, #3a1a5a, #1a0a3a);
        border-radius: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 36px;
        border: 1px solid rgba(180,140,255,0.3);
    }

    .record-info {
        flex: 1;
    }

    .record-distance {
        color: #ffffff;
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 6px;
    }

    .record-time {
        color: #b0a0ff;
        font-size: 32px;
        font-weight: 800;
        letter-spacing: -0.5px;
    }

    .record-meta {
        color: #888;
        font-size: 13px;
        margin-top: 6px;
    }

    .record-crown {
        color: #ffd700;
        font-size: 28px;
    }

    .empty-state {
        text-align: center;
        padding: 80px 20px;
        color: #888;
    }

    .empty-icon {
        font-size: 80px;
        margin-bottom: 24px;
        opacity: 0.5;
    }
</style>

<div class="records-container">
    <div class="page-header">
        <h1>🏆 рекорды</h1>
        <p>твои лучшие результаты на дистанциях</p>
    </div>

    <div class="records-grid" id="recordsGrid">
        <div class="empty-state">
            <div class="empty-icon">🏃</div>
            <p>загрузка...</p>
        </div>
    </div>
</div>

<script>
const distanceNames = {
    1: '1 км',
    5: '5 км',
    10: '10 км',
    21.1: 'полумарафон',
    42.2: 'марафон'
};

const distanceIcons = {
    1: '🏃',
    5: '⚡',
    10: '🔥',
    21.1: '💪',
    42.2: '👑'
};

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const records = await API.get('/api/personal_records');
        const grid = document.getElementById('recordsGrid');

        if (records.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">🏆</div>
                    <p>пока нет рекордов</p>
                    <p style="font-size: 14px; margin-top: 8px;">пробеги 1 км, 5 км или больше — рекорды появятся здесь</p>
                </div>
            `;
            return;
        }

        grid.innerHTML = records.map(r => {
            const time = r.time;
            const hours = Math.floor(time / 3600);
            const minutes = Math.floor((time % 3600) / 60);
            const seconds = time % 60;

            let timeStr;
            if (hours > 0) {
                timeStr = `${hours}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            } else {
                timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }

            const pace = time / r.distance;
            const paceMin = Math.floor(pace / 60);
            const paceSec = Math.floor(pace % 60);

            return `
                <div class="record-card">
                    <div class="record-icon">${distanceIcons[r.distance] || '🏃'}</div>
                    <div class="record-info">
                        <div class="record-distance">${distanceNames[r.distance] || r.distance + ' км'}</div>
                        <div class="record-time">${timeStr}</div>
                        <div class="record-meta">темп ${paceMin}:${paceSec.toString().padStart(2, '0')}/км • ${new Date(r.achieved_at).toLocaleDateString('ru-RU', {day:'numeric', month:'long', year:'numeric'})}</div>
                    </div>
                    <div class="record-crown">👑</div>
                </div>
            `;
        }).join('');

    } catch (e) {
        console.error('Ошибка:', e);
    }
});
</script>
{% endblock %}
