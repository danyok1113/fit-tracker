{% extends "base.html" %}

{% block title %}RunTracker • AI Тренер{% endblock %}

{% block content %}
<style>
    body { background: #0A0E17; }
    .chat-container {
        max-width: 800px;
        margin: 0 auto;
        padding: 20px;
        height: calc(100vh - 70px);
        display: flex;
        flex-direction: column;
    }

    .chat-header {
        background: linear-gradient(135deg, #1A2332, #0D1117);
        border-radius: 30px;
        padding: 25px;
        margin-bottom: 20px;
        border-left: 4px solid #00C9A7;
        animation: slideDown 0.5s ease;
    }

    .chat-header h2 {
        color: white;
        font-size: 24px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .chat-header p {
        color: #8A9BB5;
        margin-top: 8px;
        font-size: 14px;
    }

    .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 10px 5px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .message {
        display: flex;
        gap: 12px;
        max-width: 85%;
        animation: fadeUp 0.3s ease;
    }

    .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
    }

    .message-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
    }

    .message.user .message-avatar {
        background: #00C9A7;
        color: white;
    }

    .message.ai .message-avatar {
        background: #252F3F;
        color: #00C9A7;
    }

    .message-bubble {
        background: #1A2332;
        padding: 15px 18px;
        border-radius: 20px;
        color: white;
        font-size: 15px;
        line-height: 1.5;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .message.user .message-bubble {
        background: linear-gradient(135deg, #00C9A7, #00B4D8);
    }

    .message.ai .message-bubble {
        border-bottom-left-radius: 5px;
    }

    .message.user .message-bubble {
        border-bottom-right-radius: 5px;
    }

    .chat-input-area {
        background: #1A2332;
        border-radius: 60px;
        padding: 8px;
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    .chat-input {
        flex: 1;
        background: transparent;
        border: none;
        padding: 15px 20px;
        color: white;
        font-size: 16px;
        outline: none;
    }

    .chat-input::placeholder {
        color: #5A6D8A;
    }

    .send-btn {
        background: #00C9A7;
        border: none;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        color: white;
        font-size: 20px;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .send-btn:hover {
        background: #00B4D8;
        transform: scale(1.05);
    }

    .send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .typing-indicator {
        display: flex;
        gap: 5px;
        padding: 15px 18px;
    }

    .typing-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #8A9BB5;
        animation: typing 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typing {
        0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
        30% { transform: translateY(-10px); opacity: 1; }
    }

    .quick-questions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin: 15px 0;
    }

    .quick-btn {
        background: #252F3F;
        border: none;
        padding: 10px 16px;
        border-radius: 30px;
        color: #8A9BB5;
        font-size: 13px;
        cursor: pointer;
        transition: all 0.2s;
    }

    .quick-btn:hover {
        background: #00C9A7;
        color: white;
    }

    @keyframes slideDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 768px) {
        .chat-container { padding: 15px; }
        .message { max-width: 90%; }
        .message-bubble { padding: 12px 14px; font-size: 14px; }
    }
</style>

<div class="chat-container">
    <div class="chat-header">
        <h2><span>🧠</span> AI Тренер DeepSeek</h2>
        <p>Задай вопрос о тренировках, питании или восстановлении</p>
    </div>

    <div class="quick-questions">
        <button class="quick-btn" data-question="Составь план беговых тренировок на неделю">📅 План на неделю</button>
        <button class="quick-btn" data-question="Как улучшить темп на 5 километров?">⚡ Улучшить темп</button>
        <button class="quick-btn" data-question="Что есть перед пробежкой?">🍎 Питание</button>
        <button class="quick-btn" data-question="Как правильно восстанавливаться после бега?">🛌 Восстановление</button>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="message ai">
            <div class="message-avatar">🧠</div>
            <div class="message-bubble">
                Привет! Я твой персональный AI-тренер. Задай мне любой вопрос о беге, тренировках или питании!
            </div>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Напиши свой вопрос..." />
        <button class="send-btn" id="sendBtn">➤</button>
    </div>
</div>

<script>
const chatMessages = document.getElementById('chatMessages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');

function addMessage(text, isUser = false) {
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isUser ? 'user' : 'ai'}`;
    messageDiv.innerHTML = `
        <div class="message-avatar">${isUser ? '👤' : '🧠'}</div>
        <div class="message-bubble">${text}</div>
    `;
    chatMessages.appendChild(messageDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function showTyping() {
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message ai';
    typingDiv.id = 'typingIndicator';
    typingDiv.innerHTML = `
        <div class="message-avatar">🧠</div>
        <div class="message-bubble">
            <div class="typing-indicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    `;
    chatMessages.appendChild(typingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;
}

function hideTyping() {
    const typing = document.getElementById('typingIndicator');
    if (typing) typing.remove();
}

async function sendMessage(message) {
    if (!message.trim()) return;

    addMessage(message, true);
    chatInput.value = '';
    sendBtn.disabled = true;
    showTyping();

    try {
        const res = await fetch('/api/ai/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: message})
        });

        const data = await res.json();
        hideTyping();
        addMessage(data.reply);
    } catch (e) {
        hideTyping();
        addMessage('Извини, произошла ошибка. Попробуй ещё раз.');
    } finally {
        sendBtn.disabled = false;
        chatInput.focus();
    }
}

sendBtn.addEventListener('click', () => sendMessage(chatInput.value));
chatInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') sendMessage(chatInput.value);
});

document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => sendMessage(btn.dataset.question));
});
</script>
{% endblock %}
