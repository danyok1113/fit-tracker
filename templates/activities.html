{% extends "base.html" %}

{% block title %}RunTracker • История{% endblock %}

{% block content %}
<style>
    body { background: #0A0E17; }
    .history-container { max-width: 900px; margin: 0 auto; padding: 20px; }

    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
    }

    .page-header h1 { color: white; font-size: 28px; font-weight: 800; }

    .filter-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 20px;
        overflow-x: auto;
        padding-bottom: 5px;
    }

    .filter-tab {
        padding: 8px 16px;
        background: #1A2332;
        border: none;
        border-radius: 30px;
        color: #8A9BB5;
        font-size: 13px;
        cursor: pointer;
        white-space: nowrap;
    }

    .filter-tab.active {
        background: #00C9A7;
        color: white;
    }

    .activity-group {
        margin-bottom: 25px;
    }

    .group-header {
        color: #8A9BB5;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 10px;
        padding-left: 5px;
    }

    .activity-card {
        background: #1A2332;
        border-radius: 20px;
        padding: 18px;
        margin-bottom: 10px;
        display: flex;
        align-items: center;
        cursor: pointer;
        transition: all 0.2s;
    }

    .activity-card:hover { background: #252F3F; }

    .activity-icon {
        width: 55px;
        height: 55px;
        background: linear-gradient(135deg, #00C9A7, #00B4D8);
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 15px;
        color: white;
        font-size: 26px;
    }

    .activity-details { flex: 1; }
    .activity-title { font-size: 16px; font-weight: 700; color: white; margin-bottom: 6px; }
    .activity-stats { display: flex; gap: 15px; color: #8A9BB5; font-size: 13px; flex-wrap: wrap; }

    .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #8A9BB5;
    }

    .empty-icon { font-size: 70px; margin-bottom: 20px; opacity: 0.5; }

    .add-fab {
        position: fixed;
        bottom: 30px;
        right: 20px;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #00C9A7, #00B4D8);
        border-radius: 30px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 28px;
        box-shadow: 0 10px 30px rgba(0,201,167,0.4);
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
    }

    .add-fab:hover { transform: scale(1.05); }
</style>

<div class="history-container">
    <div class="page-header">
        <h1>📋 История</h1>
    </div>

    <div class="filter-tabs">
        <button class="filter-tab active" data-filter="all">Все</button>
        <button class="filter-tab" data-filter="running">🏃 Бег</button>
        <button class="filter-tab" data-filter="cycling">🚴 Вело</button>
        <button class="filter-tab" data-filter="swimming">🏊 Плавание</button>
        <button class="filter-tab" data-filter="strength">🏋️ Силовые</button>
    </div>

    <div id="activitiesList">
        <div class="empty-state">
            <div class="empty-icon">🏃</div>
            <p>Загрузка...</p>
        </div>
    </div>
</div>

<a href="/activities/add" class="add-fab">+</a>

<script>
let allActivities = [];
let currentFilter = 'all';

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const res = await fetch('/api/activities');
        allActivities = await res.json();
        renderActivities();
    } catch (e) {
        document.getElementById('activitiesList').innerHTML = '<div class="empty-state"><p>Ошибка загрузки</p></div>';
    }

    document.querySelectorAll('.filter-tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            renderActivities();
        });
    });
});

function renderActivities() {
    const list = document.getElementById('activitiesList');
    let filtered = allActivities;

    if (currentFilter !== 'all') {
        filtered = allActivities.filter(a => a.sport_type === currentFilter);
    }

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">
            <div class="empty-icon">${currentFilter === 'all' ? '🏃' :
                currentFilter === 'running' ? '🏃' :
                currentFilter === 'cycling' ? '🚴' :
                currentFilter === 'swimming' ? '🏊' : '🏋️'}</div>
            <p>Нет тренировок</p>
        </div>`;
        return;
    }

    // Группировка по датам
    const grouped = {};
    filtered.forEach(act => {
        const date = new Date(act.start_time).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long', year: 'numeric' });
        if (!grouped[date]) grouped[date] = [];
        grouped[date].push(act);
    });

    list.innerHTML = '';
    const icons = { running: '🏃', cycling: '🚴', swimming: '🏊', strength: '🏋️' };
    const units = { running: 'км', cycling: 'км', swimming: 'м', strength: 'подх.' };

    Object.entries(grouped).forEach(([date, acts]) => {
        const groupDiv = document.createElement('div');
        groupDiv.className = 'activity-group';
        groupDiv.innerHTML = `<div class="group-header">${date}</div>`;

        acts.forEach(act => {
            const card = document.createElement('div');
            card.className = 'activity-card';
            card.onclick = () => window.location.href = `/activity/${act.id}`;

            let mainStat = '';
            if (act.sport_type === 'strength') {
                mainStat = `${act.sets || 0} подходов`;
            } else if (act.sport_type === 'swimming') {
                mainStat = `${(act.distance || 0).toFixed(0)} м`;
            } else {
                mainStat = `${(act.distance / 1000).toFixed(2)} км`;
            }

            card.innerHTML = `
                <div class="activity-icon">${icons[act.sport_type] || '🏃'}</div>
                <div class="activity-details">
                    <div class="activity-title">${act.name}</div>
                    <div class="activity-stats">
                        <span>⏱️ ${Math.floor(act.duration / 60)} мин</span>
                        <span>📊 ${mainStat}</span>
                        ${act.avg_pace && act.sport_type !== 'strength' ?
                            `<span>⚡ ${Math.floor(act.avg_pace/60)}:${Math.floor(act.avg_pace%60).toString().padStart(2,'0')}/км</span>` : ''}
                        <span>🔥 ${act.calories || 0} ккал</span>
                    </div>
                </div>
            `;
            groupDiv.appendChild(card);
        });

        list.appendChild(groupDiv);
    });
}
</script>
{% endblock %}
