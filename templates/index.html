{% extends "base.html" %}

{% block title %}Fit • умный трекер{% endblock %}

{% block content %}
<style>
    .landing {
        min-height: calc(100vh - 140px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 20px;
    }

    .landing h1 {
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, #ffffff 0%, #b0a0ff 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 16px;
        letter-spacing: -1px;
    }

    .landing p {
        color: #aaaaaa;
        font-size: 20px;
        font-weight: 400;
        margin-bottom: 48px;
    }

    .auth-box {
        background: linear-gradient(135deg, #1a0a30, #0a0218);
        border-radius: 32px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        border: 1px solid rgba(140,100,255,0.2);
        box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }

    .tabs {
        display: flex;
        gap: 20px;
        margin-bottom: 32px;
        justify-content: center;
    }

    .tab {
        color: #888888;
        font-weight: 600;
        font-size: 18px;
        cursor: pointer;
        padding-bottom: 8px;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
    }

    .tab.active {
        color: #ffffff;
        border-bottom-color: #a080ff;
    }

    .form { display: none; }
    .form.active { display: block; }

    .input {
        width: 100%;
        padding: 16px 18px;
        background: rgba(10,5,25,0.8);
        border: 1px solid rgba(140,100,255,0.3);
        border-radius: 16px;
        color: #ffffff;
        font-size: 16px;
        margin-bottom: 16px;
        outline: none;
    }

    .input:focus {
        border-color: #a080ff;
        box-shadow: 0 0 15px rgba(160,128,255,0.2);
    }

    .submit {
        width: 100%;
        padding: 16px;
        background: #a080ff;
        color: #000000;
        border: none;
        border-radius: 50px;
        font-weight: 700;
        font-size: 17px;
        cursor: pointer;
        margin-top: 8px;
        transition: all 0.3s ease;
    }

    .submit:hover {
        background: #b090ff;
        transform: translateY(-2px);
    }

    .error {
        color: #ff8080;
        font-size: 14px;
        margin-top: 12px;
        text-align: center;
    }

    .quick-start {
        display: flex;
        gap: 20px;
        margin-top: 40px;
    }

    .quick-btn {
        padding: 16px 32px;
        background: linear-gradient(135deg, #1a0a30, #0a0218);
        border: 1px solid rgba(140,100,255,0.2);
        border-radius: 50px;
        color: #ffffff;
        font-weight: 600;
        font-size: 18px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.3s ease;
        display: inline-flex;
        align-items: center;
        gap: 10px;
    }

    .quick-btn:hover {
        background: #2a1a4a;
        border-color: #a080ff;
        transform: translateY(-2px);
    }
</style>

<div class="landing">
    <h1>Fit</h1>
    <p>умный трекер тренировок</p>

    <div class="auth-box">
        <div class="tabs">
            <span class="tab active" data-tab="login">вход</span>
            <span class="tab" data-tab="register">регистрация</span>
        </div>

        <form id="loginForm" class="form active">
            <input type="text" name="username" placeholder="логин" class="input" required>
            <input type="password" name="password" placeholder="пароль" class="input" required>
            <button type="submit" class="submit">войти</button>
            <div class="error" id="loginError"></div>
        </form>

        <form id="registerForm" class="form">
            <input type="text" name="username" placeholder="логин" class="input" required>
            <input type="text" name="name" placeholder="имя" class="input">
            <input type="password" name="password" placeholder="пароль" class="input" required>
            <input type="password" name="confirm_password" placeholder="подтверждение" class="input" required>
            <button type="submit" class="submit">зарегистрироваться</button>
            <div class="error" id="registerError"></div>
        </form>
    </div>

    <div class="quick-start">
        <a href="/tracker?type=running" class="quick-btn">🏃 бег</a>
        <a href="/tracker?type=cycling" class="quick-btn">🚴 вело</a>
    </div>
</div>

<script>
document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.form').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.tab + 'Form').classList.add('active');
});

document.getElementById('loginForm').onsubmit = async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
        const res = await API.post('/api/login', {
            username: fd.get('username'),
            password: fd.get('password')
        });
        localStorage.setItem('user', JSON.stringify(res));
        window.location.href = '/dashboard';
    } catch (e) {
        document.getElementById('loginError').textContent = e.message;
    }
};

document.getElementById('registerForm').onsubmit = async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    if (fd.get('password') !== fd.get('confirm_password')) {
        document.getElementById('registerError').textContent = 'пароли не совпадают';
        return;
    }
    try {
        const res = await API.post('/api/register', {
            username: fd.get('username'),
            name: fd.get('name') || fd.get('username'),
            password: fd.get('password')
        });
        localStorage.setItem('user', JSON.stringify(res));
        window.location.href = '/dashboard';
    } catch (e) {
        document.getElementById('registerError').textContent = e.message;
    }
};
</script>
{% endblock %}
