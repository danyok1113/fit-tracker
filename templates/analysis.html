{% extends "base.html" %}

{% block title %}Fit • анализ{% endblock %}

{% block content %}
<style>
    .analysis-container {
        max-width: 800px;
        margin: 0 auto;
    }

    .page-header {
        margin-bottom: 32px;
    }

    .page-header h1 {
        font-size: 36px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: -1px;
    }

    .page-header p {
        color: #a090cc;
        font-size: 16px;
        margin-top: 8px;
    }

    .analyze-btn {
        width: 100%;
        padding: 20px;
        background: linear-gradient(135deg, #a080ff, #8060cc);
        border: none;
        border-radius: 60px;
        color: #000000;
        font-weight: 700;
        font-size: 18px;
        cursor: pointer;
        margin-bottom: 32px;
        transition: all 0.3s ease;
        box-shadow: 0 10px 30px rgba(160,128,255,0.3);
    }

    .analyze-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px rgba(160,128,255,0.4);
    }

    .analyze-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    .analysis-result {
        background: linear-gradient(135deg, #1a0a30, #0a0218);
        border-radius: 28px;
        padding: 32px;
        border: 1px solid rgba(140,100,255,0.2);
        display: none;
        animation: fadeUp 0.5s ease;
    }

    .analysis-result.show {
        display: block;
    }

    .result-section {
        color: #ffffff !important;
    }

    .result-section p {
        color: #ffffff !important;
        margin-bottom: 24px;
        line-height: 1.7;
    }

    .section-title {
        color: #a080ff !important;
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .loading {
        text-align: center;
        padding: 40px;
        color: #a090cc;
    }

    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(160,128,255,0.2);
        border-top-color: #a080ff;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
    }
</style>

<div class="analysis-container">
    <div class="page-header">
        <h1>🧠 AI-анализ</h1>
        <p>нейросеть анализирует твои тренировки и даёт персональные рекомендации</p>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()">
        🔍 получить анализ тренировок
    </button>

    <div class="analysis-result" id="analysisResult">
        <div class="loading" id="loadingState">
            <div class="loading-spinner"></div>
            <p>анализирую твои тренировки...</p>
        </div>
        <div id="resultContent"></div>
    </div>
</div>

<script>
async function runAnalysis() {
    const btn = document.getElementById('analyzeBtn');
    const resultDiv = document.getElementById('analysisResult');
    const loadingState = document.getElementById('loadingState');
    const resultContent = document.getElementById('resultContent');

    btn.disabled = true;
    btn.textContent = '⏳ анализирую...';
    resultDiv.classList.add('show');
    loadingState.style.display = 'block';
    resultContent.innerHTML = '';

    try {
        const activities = await API.get('/api/activities');
        const user = await API.get('/api/user');

        const last30Days = activities.filter(a => new Date(a.start_time) > new Date(Date.now() - 30 * 24 * 60 * 60 * 1000));
        const last7Days = activities.filter(a => new Date(a.start_time) > new Date(Date.now() - 7 * 24 * 60 * 60 * 1000));

        const running = activities.filter(a => a.sport_type === 'running');
        const cycling = activities.filter(a => a.sport_type === 'cycling');
        const swimming = activities.filter(a => a.sport_type === 'swimming');
        const strength = activities.filter(a => a.sport_type === 'strength');

        let context = `ДАННЫЕ ПОЛЬЗОВАТЕЛЯ:
- Вес: ${user.weight} кг
- Рост: ${user.height} см
- Возраст: ${user.age} лет

СТАТИСТИКА ТРЕНИРОВОК:
- Всего тренировок: ${activities.length}
- За последние 30 дней: ${last30Days.length}
- За последние 7 дней: ${last7Days.length}
`;

        if (running.length > 0) {
            const dist = running.reduce((s, a) => s + a.distance, 0) / 1000;
            const time = running.reduce((s, a) => s + a.duration, 0);
            const avgPace = running.reduce((s, a) => s + (a.avg_pace || 0), 0) / running.length;
            context += `\n🏃 БЕГ:\n- Пробежек: ${running.length}\n- Дистанция: ${dist.toFixed(2)} км\n- Время: ${Math.floor(time/60)} мин\n- Средний темп: ${avgPace ? Math.floor(avgPace/60)+':'+Math.floor(avgPace%60).toString().padStart(2,'0') : '—'} /км\n`;
        } else {
            context += `\n🏃 БЕГ: нет тренировок\n`;
        }

        if (cycling.length > 0) {
            const dist = cycling.reduce((s, a) => s + a.distance, 0) / 1000;
            const time = cycling.reduce((s, a) => s + a.duration, 0);
            context += `\n🚴 ВЕЛО:\n- Поездок: ${cycling.length}\n- Дистанция: ${dist.toFixed(2)} км\n- Время: ${Math.floor(time/60)} мин\n`;
        } else {
            context += `\n🚴 ВЕЛО: нет тренировок\n`;
        }

        if (swimming.length > 0) {
            const dist = swimming.reduce((s, a) => s + a.distance, 0);
            const time = swimming.reduce((s, a) => s + a.duration, 0);
            context += `\n🏊 ПЛАВАНИЕ:\n- Заплывов: ${swimming.length}\n- Дистанция: ${dist.toFixed(0)} м\n- Время: ${Math.floor(time/60)} мин\n`;
        } else {
            context += `\n🏊 ПЛАВАНИЕ: нет тренировок\n`;
        }

        if (strength.length > 0) {
            const sets = strength.reduce((s, a) => s + (a.sets || 0), 0);
            const time = strength.reduce((s, a) => s + a.duration, 0);
            context += `\n🏋️ СИЛОВЫЕ:\n- Тренировок: ${strength.length}\n- Подходов: ${sets}\n- Время: ${Math.floor(time/60)} мин\n`;
        } else {
            context += `\n🏋️ СИЛОВЫЕ: нет тренировок\n`;
        }

        const last5 = activities.slice(0, 5);
        context += `\nПОСЛЕДНИЕ 5 ТРЕНИРОВОК:\n`;
        last5.forEach((a, i) => {
            const date = new Date(a.start_time).toLocaleDateString('ru-RU');
            let details = '';
            if (a.sport_type === 'strength') details = `${a.sets || 0} подх.`;
            else if (a.sport_type === 'swimming') details = `${(a.distance || 0).toFixed(0)} м`;
            else details = `${((a.distance || 0)/1000).toFixed(2)} км`;
            context += `${i+1}. ${date}: ${a.sport_type} — ${details}, ${Math.floor((a.duration||0)/60)} мин\n`;
        });

        const prompt = `Ты — профессиональный спортивный аналитик. Проанализируй данные и дай отчёт.

${context}

Структура ответа (строго):
ПРОГРЕСС
(здесь текст про прогресс)

ПРОБЛЕМЫ
(здесь текст про проблемы)

РЕКОМЕНДАЦИИ
(здесь текст с рекомендациями)

Пиши на русском, с эмодзи. Не используй HTML и markdown.`;

        const aiResponse = await API.post('/api/ai/chat', { message: prompt });

        // Чистим ответ
        let rawReply = aiResponse.reply
            .replace(/<[^>]*>/g, '')
            .replace(/&lt;/g, '<')
            .replace(/&gt;/g, '>')
            .replace(/&amp;/g, '&');

        // Извлекаем секции
        let progressText = '';
        let problemsText = '';
        let recommendationsText = '';

        const progressMatch = rawReply.match(/ПРОГРЕСС[\s\S]*?(?=ПРОБЛЕМЫ|$)/i);
        if (progressMatch) progressText = progressMatch[0].replace(/ПРОГРЕСС/i, '').trim();

        const problemsMatch = rawReply.match(/ПРОБЛЕМЫ[\s\S]*?(?=РЕКОМЕНДАЦИИ|$)/i);
        if (problemsMatch) problemsText = problemsMatch[0].replace(/ПРОБЛЕМЫ/i, '').trim();

        const recMatch = rawReply.match(/РЕКОМЕНДАЦИИ[\s\S]*$/i);
        if (recMatch) recommendationsText = recMatch[0].replace(/РЕКОМЕНДАЦИИ/i, '').trim();

        // Если не нашли — берём весь текст
        if (!progressText && !problemsText && !recommendationsText) {
            progressText = rawReply;
        }

        // Форматируем
        progressText = progressText.replace(/\n/g, '<br>');
        problemsText = problemsText.replace(/\n/g, '<br>');
        recommendationsText = recommendationsText.replace(/\n/g, '<br>');

        let formattedHtml = '';
        if (progressText) formattedHtml += `<div class="section-title">📈 ПРОГРЕСС</div><p>${progressText}</p>`;
        if (problemsText) formattedHtml += `<div class="section-title">⚠️ ПРОБЛЕМЫ</div><p>${problemsText}</p>`;
        if (recommendationsText) formattedHtml += `<div class="section-title">💡 РЕКОМЕНДАЦИИ</div><p>${recommendationsText}</p>`;

        loadingState.style.display = 'none';
        resultContent.innerHTML = `<div class="result-section">${formattedHtml}</div>`;

    } catch (e) {
        console.error('Ошибка:', e);
        loadingState.style.display = 'none';
        resultContent.innerHTML = `<div class="result-section"><div class="section-title">❌ Ошибка</div><p>Не удалось выполнить анализ. Попробуй позже.</p></div>`;
    } finally {
        btn.disabled = false;
        btn.textContent = '🔍 получить анализ тренировок';
    }
}
</script>
{% endblock %}
